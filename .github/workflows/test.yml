name: test

on:
  push:
    branches: [main, master]
  pull_request:

jobs:
  pytest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Install package with dev deps
        run: pip install -e ".[dev]"
      - name: Run unit tests
        run: pytest tests/ -m "not integration"
